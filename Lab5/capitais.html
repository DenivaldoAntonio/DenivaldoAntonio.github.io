<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capitais</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: #f4f4f4;
      color: #333;
    }

    header {
      background: #ddd;
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
    }

    h1 {
      font-size: 1.5em;
    }

    nav a {
      padding: 20px;
      color: #333;
      text-decoration: none;
    }

    nav a:hover {
      background: #aaa;
      color: white;
    }

    nav a:last-child {
      background: #777;
      color: white;
    }

    article {
      height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2em;
    }

    #poema {
      background: #f0e68c;
    }

    #paisagem {
      background: #87ceeb;
    }

    #cidades {
      background: #98fb98;
    }

    .image-container {
      position: relative;
      width: 100vw;
      height: auto;
    }

    .image-container img {
      width: 100vw;
      height: auto;
    }

    .image-container p {
      position: absolute;
      bottom: 10px;
      right: 20px;
      color: #fff;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 5px;
      border-radius: 5px;
    }

    .image-container p a {
      color: #fff;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <header>
    <h1>Capitais</h1>
    <nav>
      <a href="#poema">Poema</a>
      <a href="#paisagem">Paisagem</a>
      <a href="#cidades">Capitais</a>
      <a href="index.html">A minha cidade</a>
    </nav>
  </header>

  <article id="poema">
    <pre>
      Viajar. Perder paises!
      Ser outro constantemente
      Por a alma não ter raízes
      De viver de ver somente
      Fernando Pessoa
    </pre>
  </article>

  <article id="paisagem">
    <div class="image-container">
      <img src="images/singapuraC.jpg" alt="Paisagem de Singapura">
      Image by <a href="https://pixabay.com/users/cegoh-94852/?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=2718300">Jason Goh</a> from <a href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=image&utm_content=2718300">Pixabay</a>
    </div>
  </article>

  <article id="cidades">
    <p>Seção Capitais</p>
  </article>

</body>

</html>
