<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capitais</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      background: #f4f4f4;
      color: #333;
    }

    header {
      background: #ddd;
      position: sticky;
      top: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
    }

    h1 {
      font-size: 1.5em;
    }

    nav a {
      padding: 20px;
      color: #333;
      text-decoration: none;
    }

    nav a:hover {
      background: #aaa;
      color: white;
    }

    nav a:last-child {
      background: #777;
      color: white;
    }

    nav a:link,
    nav a:visited {
      color: #333;
    }

    nav a:hover,
    nav a:active {
      color: white;
    }

    article {
      height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2em;
    }

    #poema {
      background: #f0e68c;
    }

    #paisagem {
      background: #87ceeb;
    }

    #cidades {
      background: #98fb98;
    }
  </style>
</head>

<body>

  <header>
    <h1>Capitais</h1>
    <nav>
      <a href="#poema">Poema</a>
      <a href="#paisagem">Paisagem</a>
      <a href="#cidades">Capitais</a>
      <a href="index.html">A minha cidade</a>
    </nav>
  </header>

  <article id="poema">
    <p>Seção Poema</p>

    <p>Ser outro constantemente</p>
    <p>Por a alma não ter raízes</p>
    <p>De viver de ver somente</p>
    <p>Fernando Pessoa</p>
  </article>

  <article id="paisagem">
    <p>Seção Paisagem</p>
